name: CI/CD Pipeline

# This triggers the action every time you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Ensure Python files have valid syntax (Simulated Check)
      - name: Run Syntax Check
        run: |
          python -m py_compile data_analysis.py
          python -m py_compile lambda_function.py

      # Step 3: Log in to Docker Hub using your secure secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build the Docker image and push it to your registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/diet-analysis:latest
          
      # New Step: Tell Azure to pull the new container image
      - name: Deploy to Azure Function App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'diet-analysis-app-group1'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.DOCKER_USERNAME }}/diet-analysis:latest'
